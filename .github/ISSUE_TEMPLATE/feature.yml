name: Feature request
description: Propose a new evidence source, diagnosis, or workflow.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Cache-debugging problem
      description: Describe the real situation rather than only the proposed UI.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Available deterministic evidence
      description: Which run-summary or local repository data supports the diagnosis?
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Desired result
    validations:
      required: true
