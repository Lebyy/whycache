name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x64
            binary: whycache
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
            binary: whycache
          - os: macos-14
            target: aarch64-apple-darwin
            asset: darwin-arm64
            binary: whycache
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: darwin-x64
            binary: whycache
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: win32-x64
            binary: whycache.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo test --all-targets --all-features
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          tar -C dist -czf "whycache-${{ github.ref_name }}-${{ matrix.asset }}.tar.gz" .
      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item README.md,LICENSE-MIT,LICENSE-APACHE dist/
          Compress-Archive -Path dist/* -DestinationPath "whycache-${{ github.ref_name }}-${{ matrix.asset }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: whycache-${{ github.ref_name }}-${{ matrix.asset }}.*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify tag and package versions
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "$version" = "$cargo_version"
          test "$version" = "$(node -p "require('./npm/whycache/package.json').version")"
      - name: Checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Populate native packages
        run: |
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            mkdir -p "npm/platform/$target/bin" "unpacked/$target"
            tar -xzf artifacts/$target/*.tar.gz -C "unpacked/$target"
            cp "unpacked/$target/whycache" "npm/platform/$target/bin/whycache"
          done
          mkdir -p npm/platform/win32-x64/bin unpacked/win32-x64
          unzip -q artifacts/win32-x64/*.zip -d unpacked/win32-x64
          cp unpacked/win32-x64/whycache.exe npm/platform/win32-x64/bin/whycache.exe
      - name: Smoke-test the npm launcher
        run: |
          mkdir -p npm/whycache/node_modules/@whycache
          cp -R npm/platform/linux-x64 npm/whycache/node_modules/@whycache/linux-x64
          node npm/whycache/bin/whycache.js --version
      - name: Publish platform packages
        run: |
          for package in npm/platform/*; do npm publish "./$package" --access public --provenance; done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish installer package
        run: npm publish ./npm/whycache --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
